<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureLocks Chat</title>
    <link rel="stylesheet" href="css/chat.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">

        <!-- Left Sidebar: Online Users -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>SecureLocks</h2>
            </div>
            <div class="sidebar-search">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search users...">
                </div>
            </div>
            <div class="sidebar-list-header">
                <h3>Online Members (<span id="onlineCount">0</span>)</h3>
            </div>
            <ul id="onlineUsersList" class="user-list">
                <!-- Dynamically populated -->
            </ul>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <!-- Chat Header -->
            <header class="chat-header">
                <div class="header-left">
                    <div class="chat-avatar">
                        <i class="fa-solid fa-users"></i>
                    </div>
                    <div class="chat-info">
                        <h2>Global Chat</h2>
                        <span id="status">Connecting...</span>
                    </div>
                </div>

                <div class="header-right">
                    <div class="current-user-info">
                        <i class="fa-solid fa-user-circle"></i>
                        <span id="currentUser">Loading...</span>
                    </div>
                    <button id="logoutButton" class="icon-button" title="Sign Out">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </button>
                </div>
            </header>

            <!-- Messages Container -->
            <div class="messages-container" id="messagesContainer">
                <div class="messages-wrapper" id="messagesList">
                    <!-- Messages appear here -->
                </div>
            </div>

            <!-- Typing Indicator -->
            <div id="typingIndicator" class="typing-indicator">
                <div class="dots">
                    <span></span><span></span><span></span>
                </div>
                <em id="typingText"></em>
            </div>

            <!-- Input Area -->
            <footer class="chat-footer">
                <button class="icon-button attach-btn">
                    <i class="fa-solid fa-paperclip"></i>
                </button>
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Write a message..." maxlength="500"
                        autocomplete="off" />
                    <button class="icon-button emoji-btn">
                        <i class="fa-regular fa-face-smile"></i>
                    </button>
                </div>
                <button id="sendButton" class="send-button" disabled>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </footer>
        </main>

    </div>

    <!-- SignalR Client Library from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>

    <!-- Our custom chat logic -->
    <script src="js/chat.js"></script>
</body>

</html>
